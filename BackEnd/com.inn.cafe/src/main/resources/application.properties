spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cafesystem?options=-c%20TimeZone=UTC}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:cafe_pg_pass}
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
server.port=8081

# Mail credentials are intentionally NOT hardcoded here. Set MAIL_USERNAME/MAIL_PASSWORD as
# environment variables (or JVM -D system properties) before starting the app. See README /
# .env.example for local development setup.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT signing secret must also be supplied via environment variable in production.
cafe.jwt.secret=${JWT_SECRET:btechdays-dev-only-secret-change-me-btechdays-dev-only}

# Razorpay payment gateway credentials. These are RANDOMLY-GENERATED PLACEHOLDER values -
# they do not belong to a real Razorpay account and cannot process real charges. Online
# payment methods (UPI/Cards/Net Banking/Wallets) will return a clear "gateway not configured"
# error until real test/live keys from https://dashboard.razorpay.com/app/keys are supplied via
# the RAZORPAY_KEY_ID / RAZORPAY_KEY_SECRET environment variables. Cash on Delivery is unaffected.
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_9nENdHqLrMnJVm}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:oeWI3oh4QzseyA5qxyCfzY0L}
